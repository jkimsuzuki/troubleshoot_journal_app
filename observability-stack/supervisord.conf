[supervisord]
nodaemon=true
loglevel=info

[program:prometheus]
command=/bin/sh -c "mkdir -p /prometheus && /usr/local/bin/prometheus --config.file=/etc/prometheus/prometheus.yml --storage.tsdb.path=/prometheus --storage.tsdb.retention.time=3y --storage.tsdb.retention.size=5GB --web.listen-address=0.0.0.0:9090"
priority=10
autorestart=true
startsecs=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:grafana]
command=/bin/sh -c "mkdir -p /prometheus/grafana && chown -R 472:0 /prometheus/grafana && GF_PATHS_DATA=/prometheus/grafana /run.sh"
priority=20
autorestart=true
startsecs=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0